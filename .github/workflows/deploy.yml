name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # This block fixes the environment target requirement error
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: './tiotai-web/package-lock.json'

      - name: Install Dependencies
        working-directory: ./tiotai-web
        run: npm ci

      - name: Static Export Compilation
        working-directory: ./tiotai-web
        run: npm run build

      - name: Upload Output Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./tiotai-web/out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4