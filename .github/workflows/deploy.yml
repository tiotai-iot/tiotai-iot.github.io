name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: './tiotai-web/package-lock.json' # Points to the correct lockfile

      - name: Install Dependencies
        working-directory: ./tiotai-web
        run: npm ci

      - name: Static Export Compilation
        working-directory: ./tiotai-web
        run: npm run build

      - name: Upload Output Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./tiotai-web/out # Points to the exported static files inside the sub-folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4